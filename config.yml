# Rokabot Configuration
# Secrets (DISCORD_TOKEN, DISCORD_CLIENT_ID, GEMINI_API_KEY) stay in .env
# Environment variables can override any value below for backward compatibility.

gemini:
  model: gemini-3.5-flash-lite # Gemini model ID
  # extractionModel: gemini-3.5-flash-lite # Optional background fact-extraction model (defaults to model)
  timeout: 45000 # API request timeout in ms (covers initial Gemini → tool → second Gemini round)
  maxRetries: 3 # Max retries for transient errors (429, 500, 503)
  maxOutputTokens: 500 # Max tokens per response (safety net)
  baseRetryDelay: 2000 # Initial retry delay in ms (doubles each retry)
  maxLlmCalls: 4 # Max chained tool calls per request
  liveMaxRetries: 2 # Retry attempts after a failed live Gemini response
  retryRpmFloor: 2 # Minimum remaining RPM required before a live retry
  extractionRpmFloor: 3 # Minimum remaining RPM required before background extraction
  extractionMaxRetries: 1 # Retry attempts after a transient extraction failure
  retryBackoffBaseMs: 1000 # Initial full-jitter retry backoff in ms (doubles each retry)
  retryBackoffCapMs: 12000 # Maximum full-jitter retry backoff in ms

rateLimit:
  rpm: 15 # Requests per minute (Gemini free tier: 15)
  rpd: 500 # Requests per day (Gemini free tier: 500)

session:
  ttl: 500000 # Idle session timeout in ms before ADK session is destroyed
  windowSize: 20 # Max messages stored in ADK session history (rehydrated from SQLite)
  maxRehydrationAge: 7200000 # Max age of messages to rehydrate in ms (2h, older messages are skipped)
  historyRetentionDays: 7 # Days before session history is auto-pruned (hourly check)

discord:
  maxMessageLength: 1500 # Char limit for bot replies (Discord max is 2000)

memory:
  bufferSize: 30 # Max messages in passive ring buffer per channel (in-memory)
  contextSize: 10 # Max overheard messages injected into system prompt per request
  extractionInterval: 20 # Messages between each background fact extraction
  extractionGapMs: 20000 # Minimum ms between extractions across all channels
  maxFactsPerUser: 20 # Max stored facts per user (oldest evicted on overflow)
  factRetentionDays: 14 # Days before unused facts are auto-pruned
  channelMonitorTtlMs: 86400000 # How long a channel stays monitored after last @mention (24h)
  claimsBackend: false # Enable typed claims extraction and retrieval (Phase 14 remains shadow-only)
  maxClaimsPerTurn: 10 # Hard cap on claims injected into one response
  retrievalTokenBudget: 350 # Approximate token budget for the claims envelope
  recentParticipantLimit: 3 # Recent non-speaker participants considered for retrieval
  speakerMinShare: 0.5 # Minimum fraction of selected claims reserved for the speaker
  maxActiveClaimsPerUser: 20 # Active claim cap per user (pinned claims are exempt)
  claimRetentionDays: 90 # Days before inactive, unpinned claims expire
  extractionDailyBudgetRatio: 0.4 # Share of the Gemini RPD budget reserved for extraction
  perGuildGapMs: 20000 # Minimum ms between extraction batches for one guild
  extractionQueueMaxPerGuild: 50 # Maximum queued extraction payloads for one guild
  vaultExportDir: data/vault # Directory for read-only Obsidian vault exports

metrics:
  retentionDays: 90 # Days before response and extraction events are auto-pruned

emoji:
  probability: 0.33 # Chance of reacting when a keyword rule matches (0-1)
  cooldownMs: 180000 # Per-channel cooldown between reactions in ms

reminders:
  checkIntervalMs: 5000 # How often the scheduler checks for due reminders in ms
  maxPerUser: 5 # Max active reminders per user
  staleThresholdMs: 300000 # Reminders older than this past their due time are auto-dropped

games:
  hangmanLives: 6 # Wrong guesses before game over
  hangmanTimeoutMs: 120000 # Inactivity timeout per hangman game in ms
  shiritoriTimeoutMs: 120000 # Inactivity timeout per shiritori turn in ms
  shinyChance: 0.01 # Chance of hatching a shiny buddy pet (0-1)

statusCycleMs: 900000 # Bot status rotation interval in ms (15 min)

timezone: Asia/Singapore # IANA timezone for time-of-day features (override with TZ env var)

logging:
  level: info # Log level: debug, info, warn, error
